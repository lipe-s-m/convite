<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Convite</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: #ebe3d8;
    }

    a {
      display: block;
      width: 100%;
      height: 100dvh;
    }

    img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
      animation: entrada 1.2s ease-out both;
    }

    @keyframes entrada {
      from {
        opacity: 0;
        transform: scale(0.92);
        filter: blur(4px);
      }
      to {
        opacity: 1;
        transform: scale(1);
        filter: blur(0);
      }
    }
  </style>
</head>
<body>
  <a href="https://noivos.casar.com/adrielle-e-adriel">
    <img src="WhatsApp Image 2026-06-28 at 00.04.23.jpeg" alt="Convite">
  </a>
</body>
</html>
