<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Convite Casamento</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,400&display=swap" rel="stylesheet">

  <meta property="og:title" content="Convite Casamento">
  <meta property="og:description" content="Queridos amigos, estamos felizes em convidar vocês para o nosso casamento. Esperamos vocês nesse dia tão especial!">
  <meta property="og:image" content="https://lipe-s-m.github.io/convite/WhatsApp%20Image%202026-06-28%20at%2000.04.23.jpeg">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://lipe-s-m.github.io/convite/">

  <meta name="twitter:card" content="summary_large_image">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: #ebe3d8;
      overflow: hidden;
    }

    .page {
      position: relative;
      width: 100%;
      height: 100dvh;
    }

    .panel {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.8s ease, visibility 0.8s ease;
    }

    .panel img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .panel-1 {
      z-index: 2;
      cursor: pointer;
    }

    .panel-1 img {
      animation: entrada 1.2s ease-out both;
    }

    .panel-2 {
      z-index: 1;
      opacity: 0;
      visibility: hidden;
    }

    .panel-2 a {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
    }

    .virado .panel-1 {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .virado .panel-2 {
      opacity: 1;
      visibility: visible;
    }

    .virado .panel-2 img {
      animation: entrada 0.8s ease-out both;
    }

    .dica {
      position: absolute;
      bottom: 24px;
      right: 24px;
      font-family: 'Playfair Display', 'Georgia', serif;
      font-size: 15px;
      font-style: italic;
      color: #1a3b1a;
      opacity: 0;
      pointer-events: none;
      text-shadow: 0 0 8px rgba(235, 227, 216, 0.8);
    }

    .panel-1 .dica {
      animation:
        aparecer 1s 4s ease-out forwards,
        flutuar 2.4s 5s ease-in-out infinite;
    }

    .virado .panel-2 .dica {
      animation:
        aparecer 1s 4s ease-out forwards,
        flutuar 2.4s 5s ease-in-out infinite;
    }

    @keyframes aparecer {
      to { opacity: 1; }
    }

    @keyframes flutuar {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-7px); }
    }

    @keyframes entrada {
      from {
        opacity: 0;
        transform: scale(0.92);
        filter: blur(4px);
      }
      to {
        opacity: 1;
        transform: scale(1);
        filter: blur(0);
      }
    }
  </style>
</head>
<body>
  <div class="page" id="page">
    <div class="panel panel-1" onclick="document.getElementById('page').classList.add('virado')">
      <img src="WhatsApp Image 2026-06-28 at 00.04.23.jpeg" alt="Convite">
      <span class="dica">Toque para avançar</span>
    </div>
    <div class="panel panel-2">
      <a href="https://noivos.casar.com/adrielle-e-adriel">
        <img src="image2.jpeg" alt="Convite completo">
      </a>
      <span class="dica">Toque para acessar</span>
    </div>
  </div>
</body>
</html>
